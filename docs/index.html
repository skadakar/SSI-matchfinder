<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Finder</title>

  <!-- Leaflet map library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

  <!-- Marker clustering -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin="anonymous"></script>

  <!-- Early theme init: must run before CSS to prevent flash of wrong theme -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      document.documentElement.dataset.theme = saved || 'gruvbox';
    }());
  </script>
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="style.css?v=b145cc1" />
</head>
<body>

  <header>
    <img id="logo" src="logo.png" alt="Match Finder" />
    <h1>Match Finder</h1>
    <span id="last-updated"></span>
    <button id="btn-theme" aria-label="Switch to dark mode">🌙</button>
    <a id="btn-github" href="https://github.com/skadakar/SSI-matchfinder" target="_blank" rel="noopener" aria-label="View on GitHub">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </header>

  <div id="app">

    <!-- ── Filter sidebar ── -->
    <aside id="filters">
      <div class="filter-group">
        <label for="filter-search">Search</label>
        <input type="text" id="filter-search" placeholder="Match name, club, city…" autocomplete="off" />
      </div>

      <div class="filter-group">
        <label>Country</label>
        <div class="multicheck-wrap" id="country-wrap">
          <button type="button" id="country-btn" class="multicheck-btn" aria-haspopup="listbox" aria-expanded="false">
            All countries
          </button>
          <div class="multicheck-panel" id="country-panel" hidden></div>
        </div>
      </div>

      <div class="filter-group" id="new-match-group">
        <label class="checkbox-row">
          <input type="checkbox" id="filter-new-match" />
          New in last <span id="new-match-days-label">7</span> days
        </label>
        <div id="new-match-slider-wrap" hidden>
          <input type="range" id="new-match-slider" min="1" max="14" value="7" />
        </div>
      </div>

      <div class="filter-group">
        <label class="checkbox-row">
          <input type="checkbox" id="filter-reg-open" />
          Open registration only
        </label>
      </div>

      <div class="filter-group">
        <div class="filter-group-header">
          <label for="filter-discipline">Discipline <small>(multi-select)</small></label>
          <button type="button" class="filter-clear" id="clear-discipline" hidden>Clear</button>
        </div>
        <select id="filter-discipline" multiple size="6"></select>
      </div>

      <div class="filter-group">
        <div class="filter-group-header">
          <label for="filter-level">Level <small>(multi-select)</small></label>
          <button type="button" class="filter-clear" id="clear-level" hidden>Clear</button>
        </div>
        <select id="filter-level" multiple size="4"></select>
      </div>

      <div class="filter-group">
        <label for="filter-from">From</label>
        <input type="date" id="filter-from" />
      </div>

      <div class="filter-group">
        <label for="filter-to">To</label>
        <input type="date" id="filter-to" />
      </div>

      <div class="filter-actions">
        <button id="btn-reset">Reset</button>
        <button id="btn-copy-link">Copy link</button>
      </div>

      <div id="match-count"></div>
    </aside>

    <!-- ── Main area ── -->
    <main id="main">

      <div id="tabs">
        <button class="tab-btn active" data-view="map">Map</button>
        <button class="tab-btn" data-view="table">Table</button>
        <button id="filter-toggle-btn" aria-expanded="false">&#9776; Filters <span class="filter-active-dot" hidden></span></button>
      </div>

      <!-- Map view -->
      <div id="view-map" class="view active">
        <div id="map"></div>
      </div>

      <!-- Table view -->
      <div id="view-table" class="view">
        <div id="col-toggles"></div>
        <div id="table-wrapper">
          <table id="matches-table">
            <thead><tr id="table-header"></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js?v=b145cc1"></script>
</body>
</html>
