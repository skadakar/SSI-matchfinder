name: Refresh Match Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  push:
    branches: [master]
    paths-ignore:            # don't re-trigger on the data commits the workflow itself makes
      - 'docs/data/**'
      - 'data/organizer-geocache.json'
      - 'data/reverse-geocache.json'
  workflow_dispatch:         # allow manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false  # let a running fetch finish; new run queues behind it

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch match data
        env:
          SSI_REFRESH_TOKEN: ${{ secrets.SSI_REFRESH_TOKEN }}
          SSI_API_KEY:       ${{ secrets.SSI_API_KEY }}
          SSI_COUNTRIES:     ${{ vars.SSI_COUNTRIES }}
        run: node scripts/fetch-matches.js

      - name: Bust asset cache
        run: |
          HASH=$(git rev-parse --short HEAD)
          sed -i "s|app\.js[^\"]*|app.js?v=${HASH}|" docs/index.html
          sed -i "s|style\.css[^\"]*|style.css?v=${HASH}|" docs/index.html

      - name: Notify Discord
        env:
          DISCORD_NOTIFY_CONFIG: ${{ secrets.DISCORD_NOTIFY_CONFIG != '' && secrets.DISCORD_NOTIFY_CONFIG || vars.DISCORD_NOTIFY_CONFIG }}
          DISCORD_NOTIFY_WEBHOOKS: ${{ secrets.DISCORD_NOTIFY_WEBHOOKS != '' && secrets.DISCORD_NOTIFY_WEBHOOKS || vars.DISCORD_NOTIFY_WEBHOOKS }}
          DISCORD_WEBHOOK_SWEDEN: ${{ secrets.DISCORD_WEBHOOK_SWEDEN }}
          DISCORD_WEBHOOK_NORWAY_RIFLE: ${{ secrets.DISCORD_WEBHOOK_NORWAY_RIFLE }}
          DISCORD_WEBHOOK_NORWAY_HANDGUN_PCC: ${{ secrets.DISCORD_WEBHOOK_NORWAY_HANDGUN_PCC }}
          DISCORD_WEBHOOK_NORWAY_PCC: ${{ secrets.DISCORD_WEBHOOK_NORWAY_PCC }}
        run: |
          if [ -n "$DISCORD_NOTIFY_CONFIG" ]; then
            echo "$DISCORD_NOTIFY_CONFIG" > data/discord-notify-config.json
          fi
          node scripts/discord-notify.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/matches.json docs/index.html data/organizer-geocache.json data/reverse-geocache.json data/discord-notify-state.json data/discord-notify-config.json
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh match data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            # Rebase onto any commits that landed while we were fetching.
            # If there's a conflict (two runs overlapping), resolve by keeping
            # our freshly-generated files and re-stamping the asset cache SHA.
            if ! git pull --rebase origin master; then
              git diff --name-only --diff-filter=U | xargs git checkout --theirs --
              HASH=$(git rev-parse --short HEAD)
              sed -i "s|app\.js[^\"]*|app.js?v=${HASH}|" docs/index.html
              sed -i "s|style\.css[^\"]*|style.css?v=${HASH}|" docs/index.html
              git add -f docs/data/matches.json docs/index.html data/organizer-geocache.json data/reverse-geocache.json
              git rebase --continue
            fi
            git push
          fi
